<html lang="en">

    <meta name="theme-color" content="#171719" />

    <title>Safir Countertop | Custom Granite & Marble Countertops</title>
    <meta name="description" content="Safir Countertop designs, fabricates, and installs custom granite, marble, and quartz countertops for kitchens and bathrooms. Free estimates, expert templating, clean installs." />
    <link rel="canonical" href="https://safircountertop.netlify.app/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Safir Countertop | Custom Granite & Marble Countertops" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Safir Countertop | Custom Granite & Marble Countertops" />
    <meta name="twitter:description" content="Custom granite, marble, and quartz countertops — expert fabrication and installation for kitchens and bathrooms." />
    <meta name="twitter:image" content="/images/og-cover.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HomeAndConstructionBusiness",
      "name": "Safir Countertop",
      "description": "Custom granite, marble, and quartz countertop fabrication and installation for kitchens and bathrooms.",
      "image": "/images/og-cover.jpg",
      "telephone": "+1-555-010-2938",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Industrial Pkwy",
        "addressLocality": "Your City",
        "addressRegion": "ST",
        "postalCode": "00000",
        "addressCountry": "US"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "08:00",
          "closes": "17:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Saturday"],
          "opens": "09:00",
          "closes": "14:00"
        }
      ],
      "sameAs": [
        "https://www.facebook.com/profile.php/?id=61588520364019",
        "https://www.instagram.com/safircountertop/"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify Forms build-time detection -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <select name="material">
        <option value="granite">Granite</option>
        <option value="marble">Marble</option>
        <option value="quartz">Quartz</option>
        <option value="not-sure">Not Sure Yet</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
